<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="Senex Solar Power">
  <!-- Sun/panel icon -->
  <g>
    <!-- Solar panel grid -->
    <rect x="2" y="10" width="34" height="24" rx="2" fill="#1E6B3A" opacity="0.12"/>
    <rect x="2" y="10" width="34" height="24" rx="2" stroke="#1E6B3A" stroke-width="1.5"/>
    <!-- Panel grid lines -->
    <line x1="13" y1="10" x2="13" y2="34" stroke="#1E6B3A" stroke-width="1" opacity="0.5"/>
    <line x1="25" y1="10" x2="25" y2="34" stroke="#1E6B3A" stroke-width="1" opacity="0.5"/>
    <line x1="2" y1="19" x2="36" y2="19" stroke="#1E6B3A" stroke-width="1" opacity="0.5"/>
    <line x1="2" y1="25" x2="36" y2="25" stroke="#1E6B3A" stroke-width="1" opacity="0.5"/>
    <!-- Sun rays -->
    <circle cx="19" cy="5" r="2.5" fill="#F5A623"/>
    <line x1="19" y1="1" x2="19" y2="2.5" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="23.5" y1="2.5" x2="22.4" y2="3.6" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="7" x2="23.5" y2="7" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14.5" y1="2.5" x2="15.6" y2="3.6" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="7" x2="14.5" y2="7" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mount post -->
    <line x1="19" y1="34" x2="19" y2="40" stroke="#1E6B3A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="13" y1="40" x2="25" y2="40" stroke="#1E6B3A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="46" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="#1A1A1A" letter-spacing="1">SENEX</text>
  <text x="46" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" fill="#6B6B6B" letter-spacing="2">SOLAR POWER</text>
</svg>
