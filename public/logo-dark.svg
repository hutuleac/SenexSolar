<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="Senex Solar Power">
  <defs>
    <clipPath id="panel-clip-dark">
      <polygon points="22,7 42,27 22,27"/>
    </clipPath>
  </defs>

  <!-- Sun (upper-left, above roof) -->
  <circle cx="9" cy="12" r="7" fill="#F5A623"/>
  <!-- Sun rays -->
  <line x1="9" y1="2" x2="9" y2="4" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15.2" y1="5.8" x2="14.1" y2="6.9" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="16.3" y2="12" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2.8" y1="5.8" x2="3.9" y2="6.9" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="0" y1="12" x2="1.7" y2="12" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left roof slope -->
  <polygon points="2,27 22,7 22,27" fill="#1E6B3A"/>

  <!-- Right roof slope (darker — panels area) -->
  <polygon points="22,7 42,27 22,27" fill="#185830"/>
  <!-- Solar panel grid lines -->
  <g clip-path="url(#panel-clip-dark)">
    <line x1="20" y1="14" x2="44" y2="14" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="20" y1="20" x2="44" y2="20" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="20" y1="26" x2="44" y2="26" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="29" y1="6" x2="29" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="36" y1="6" x2="36" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  </g>

  <!-- House body -->
  <rect x="8" y="27" width="28" height="19" fill="#1E6B3A"/>

  <!-- Window (2×2 panes) -->
  <rect x="14" y="31" width="16" height="12" fill="white" opacity="0.92"/>
  <line x1="22" y1="31" x2="22" y2="43" stroke="#1E6B3A" stroke-width="1.2"/>
  <line x1="14" y1="37" x2="30" y2="37" stroke="#1E6B3A" stroke-width="1.2"/>

  <!-- Wordmark -->
  <text x="50" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="#1A1A1A" letter-spacing="1">SENEX</text>
  <text x="50" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" fill="#6B6B6B" letter-spacing="2">SOLAR POWER</text>
</svg>
